# =============================================================================
# Patchbay -- Service Definitions
# =============================================================================
#
# Each service has these fields:
#   name          (required)  Unique display name, used as identifier in API and presets
#   type          (required)  "docker", "compose", or "systemd"
#   target        (required)  docker: container name
#                              compose: absolute path to project dir (with compose.yml)
#                              systemd: unit name (e.g. "sshd.service")
#   description   (optional)  Short text shown on the dashboard (default: "")
#   icon          (optional)  Emoji for the dashboard (default: "")
#   category      (optional)  Grouping label (default: "Uncategorized")
#   url           (optional)  Clickable link to the service's web UI
#   health_check  (optional)  HTTP health check -- see below
#
# health_check sub-fields:
#   endpoint      (required)  Full URL to check
#   method        (optional)  HTTP method (default: GET)
#   expected      (optional)  Expected status code (default: 200)
#   timeout       (optional)  Seconds (default: 5)
#   interval      (optional)  Seconds between checks (default: 30)

services:
  - name: llama-server
    type: docker
    target: llama-server
    description: "llama.cpp inference server"
    icon: "\U0001F999"
    category: AI
    url: "http://homelab.local:8080"
    health_check:
      endpoint: "http://localhost:8080/health"

  - name: Open WebUI
    type: docker
    target: open-webui
    description: "Chat interface for local and remote LLMs"
    icon: "\U0001F4AC"
    category: AI
    url: "http://homelab.local:3000"

  - name: Immich
    type: docker
    target: immich-server
    description: "Self-hosted photo and video management"
    icon: "\U0001F4F7"
    category: Media
    url: "http://homelab.local:2283"

  - name: sshd
    type: systemd
    target: sshd.service
    description: "OpenSSH server daemon"
    icon: "\U0001F4E1"
    category: Infrastructure

  - name: ComfyUI
    type: systemd
    target: comfyui
    description: "AI image generation interface"
    icon: "\U0001F3A8"
    category: AI
    url: "http://homelab.local:8188"
    health_check:
      endpoint: "http://localhost:8188/system_stats"

  - name: ERPNext
    type: compose
    target: /opt/stacks/erpnext
    description: "Full-stack ERP suite"
    icon: "\U0001F4CA"
    category: Business
    url: "http://homelab.local:8069"
    health_check:
      endpoint: "http://localhost:8069/api/method/ping"
