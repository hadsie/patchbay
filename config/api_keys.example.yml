# =============================================================================
# Patchbay -- API Keys
# =============================================================================
# API keys allow programmatic access (CLI, scripts, AI agents) via
# Authorization: Bearer <key> headers.
#
# This file is loaded from the same CONFIG_DIR as config.yml. If this file
# is missing or empty, API key authentication is disabled.
#
# Generate a key:
#   patchbay-keygen --label my-key --roles admin
#
# Each key binds to roles defined in config.yml's auth.roles section.
# Keep this file out of version control -- it contains secret hashes.
# =============================================================================

