<header class="flex items-center justify-between px-4 sm:px-8 py-4 border-b border-pb-border bg-pb-bg-sec sticky top-0 z-50">
  <div class="flex items-center gap-2.5">
    <img src="/static/logo.svg" alt="Patchbay" class="h-7 w-7">
    <span class="font-mono font-medium text-xl tracking-tight text-pb-text">Patchbay</span>
    <span class="font-mono text-xs text-pb-text-muted">{{ config.host }}:{{ config.port }}</span>
    {% if auth_username %}
    <span class="font-mono text-xs text-pb-text-muted ml-2">{{ auth_username }}</span>
    {% endif %}
  </div>
  <button
    @click="reloadConfig()"
    class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-md border border-pb-border bg-pb-card text-pb-text-sec font-mono text-xs cursor-pointer transition-all duration-150 hover:bg-pb-card-hover hover:text-pb-text hover:border-pb-border-accent"
  >
    <span :class="reloading && 'animate-spin-slow'">&#x21bb;</span>
    Reload
  </button>
</header>
